controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


joint_trajectory_controller:
  ros__parameters:
    joints:
      - link_0_JOINT_1
      - link_0_JOINT_2
      - link_0_JOINT_3

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    open_loop_control: true
    allow_partial_joints_goal: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      link_0_JOINT_1:
        trajectory: 1.0
        goal: 0.05
      link_0_JOINT_2:
        trajectory: 1.0
        goal: 0.05
      link_0_JOINT_3:
        trajectory: 1.0
        goal: 0.05